version: "3.9"

services:
  kyro:
    build:
      context: .
      dockerfile: Dockerfile
    image: kyro:latest
    ports:
      - "3000:3000"
    volumes:
      # Mount model data (optional)
      - ./models:/models:ro
      # Mount tokenizer (optional)
      - ./tokenizer.json:/app/tokenizer.json:ro
    environment:
      - KYRO_MODEL_PATH=/models/llama
      - KYRO_TOKENIZER_PATH=/app/tokenizer.json
      - RUST_LOG=kyro=info
    command: ["--host", "0.0.0.0", "--port", "3000"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
