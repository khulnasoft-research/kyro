name: Bug Report
description: Report a bug to help us improve Kyro
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Steps to reproduce the behavior
      placeholder: |
        1. Start kyro with '...'
        2. Send request '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - OS: [e.g. Ubuntu 24.04, macOS 15]
        - GPU: [e.g. NVIDIA H100, Apple M3]
        - Rust version: `rustc --version`
        - Kyro version/commit:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs & Output
      description: Relevant log output or error messages
      render: shell
