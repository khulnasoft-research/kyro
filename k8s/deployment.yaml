apiVersion: apps/v1
kind: Deployment
metadata:
  name: kyro
  labels:
    app: kyro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kyro
  template:
    metadata:
      labels:
        app: kyro
    spec:
      containers:
        - name: kyro
          image: ghcr.io/nrelab/kyro:latest
          args:
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "3000"
            - "--model-path"
            - "/models/llama"
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: RUST_LOG
              value: kyro=info
            - name: KYRO_MODEL_PATH
              value: /models/llama
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
            limits:
              cpu: "8"
              memory: "32Gi"
              nvidia.com/gpu: 1
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: kyro-models
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
